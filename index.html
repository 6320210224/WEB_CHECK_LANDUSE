function toggleBasemap(){

    var btn = document.getElementById("basemapBtn");

        map.removeLayer(osm);
        map.addLayer(satellite);

        btn.innerHTML = "OpenStreetMap";
        currentBasemap = "sat";

    } else {

        map.removeLayer(satellite);
        map.addLayer(osm);

        currentBasemap = "osm";

function normalizeName(text){
    return text
        ?.trim()
        .replace(/\s+/g,'')
        .replace(/–|—/g,'-');
}

const colorConfig = [

// 1️⃣ ที่อยู่อาศัยหนาแน่นน้อย
{ label: "ย.1-1 ถึง ย.1-17", pattern: /^ย\.1-([1-9]|1[0-7])$/, color: "#FFFF00" }, // ที่ดินประเภทที่อยู่อาศัยหนาแน่นน้อย
{ label: "ย.2-1 ถึง ย.2-19", pattern: /^ย\.2-([1-9]|1[0-9])$/, color: "#FFFF00" }, // ที่ดินประเภทที่อยู่อาศัยหนาแน่นน้อย

// 2️⃣ ที่อยู่อาศัยหนาแน่นปานกลาง
{ label: "ย.3-1 ถึง ย.3-4", pattern: /^ย\.3-[1-4]$/, color: "#FF7F00" }, // ที่ดินประเภทที่อยู่อาศัยหนาแน่นปานกลาง

// 3️⃣ พาณิชยกรรมและที่อยู่อาศัยหนาแน่นมาก
{ label: "พ.-1 ถึง พ.-3", pattern: /^พ\.-[1-3]$/, color: "#FF0033" }, // ที่ดินประเภทพาณิชยกรรมและที่อยู่อาศัยหนาแน่นมาก

// 4️⃣ ชนบทและเกษตรกรรม
{ label: "ก.1-1 ถึง ก.1-49", pattern: /^ก\.1-([1-9]|[1-5][0-9])$/, color: "#38A800" }, // ที่ดินประเภทชนบทและเกษตรกรรม
{ label: "ก.2-1 ถึง ก.2-16", pattern: /^ก\.2-([1-9]|1[0-6])$/, color: "#38A800" }, // ที่ดินประเภทชนบทและเกษตรกรรม
{ label: "ก.3-1 ถึง ก.3-14", pattern: /^ก\.3-([1-9]|1[0-4])$/, color: "#38A800" }, // ที่ดินประเภทชนบทและเกษตรกรรม

// 4️⃣ อนุรักษ์ชนบทและเกษตรกรรม
{ label: "อก.-1 ถึง อก.-4", pattern: /^อก\.-[1-4]$/, color: "#38A800" }, // ที่ดินประเภทชนบทและเกษตรกรรม

// 6️⃣ ที่โล่งเพื่อนันทนาการและการรักษาคุณภาพสิ่งแวดล้อม
{ label: "ล.-1 ถึง ล.-3", pattern: /^ล\.-[1-3]$/, color: "#BFFF00" }, // ที่ดินประเภทที่โล่งเพื่อนันทนาการและการรักษาคุณภาพสิ่งแวดล้อม

// 7️⃣ สถาบันการศึกษา
{ label: "ศษ.-1 ถึง ศษ.-38", pattern: /^ศษ\.-([1-9]|[12][0-9]|3[0-8])$/, color: "#394C00" }, // ที่ดินประเภทสถาบันการศึกษา

// 8️⃣ ที่โล่งเพื่อการรักษาคุณภาพสิ่งแวดล้อม
{ label: "ลส.-1 ถึง ลส.-2", pattern: /^ลส\.-[12]$/, color: "#7FFFFF" }, // ที่ดินประเภทที่โล่งเพื่อการรักษาคุณภาพสิ่งแวดล้อม

// 9️⃣ อนุรักษ์ศิลปวัฒนธรรม
{ label: "อศ.-1 ถึง อศ.-8", pattern: /^อศ\.-[1-8]$/, color: "#FFBF7F" }, // ที่ดินประเภทอนุรักษ์เพื่อส่งเสริมเอกลักษณ์ศิลปวัฒนธรรมไทย

// 🔟 สถาบันศาสนา
{ label: "ศน.-1 ถึง ศน.-9", pattern: /^ศน\.-[1-9]$/, color: "#9C9C9C" }, // ที่ดินประเภทสถาบันศาสนา

// 1️⃣1️⃣ สถาบันราชการ สาธารณูปโภค และสาธารณูปการ
{ label: "ส.-1 ถึง ส.-31", pattern: /^ส\.-([1-9]|[12][0-9]|3[01])$/, color: "#005CE6" } // ที่ดินประเภทสถาบันราชการ สาธารณูปโภค และสาธารณูปการ

];

function getColor(nameValue){

    if(!nameValue) return "#999999";

    nameValue = normalizeName(nameValue);

    for(let rule of colorConfig){
        if(rule.pattern.test(nameValue)){
            return rule.color;
        }
    }

    return "#999999";
}

];

    items.forEach(function(item){

function goToLocation(){
    var input = document.getElementById("coordInput").value.trim();
    var parts = input.replace(/\s+/g,'').split(',');

    if(parts.length !== 2) return alert("รูปแบบไม่ถูกต้อง");

    var a = parseFloat(parts[0]);
    var b = parseFloat(parts[1]);

    if(isNaN(a) || isNaN(b)) return alert("พิกัดไม่ถูกต้อง");

    if(a <= 90 && b <= 180){
        map.setView([a,b],16);
        L.marker([a,b]).addTo(map);
    } else {
        proj4.defs("EPSG:32647",
            "+proj=utm +zone=47 +datum=WGS84 +units=m +no_defs");

        var converted = proj4("EPSG:32647","WGS84",[a,b]);
        map.setView([converted[1],converted[0]],16);
        L.marker([converted[1],converted[0]]).addTo(map);
    }
}

// ===== Load KML / KMZ ===== 
document.getElementById("fileUpload").addEventListener("change", function(e){

var file = e.target.files[0];
if(!file) return;

var reader = new FileReader();

// ===== PNG =====
if(file.name.toLowerCase().match(/\.(png|jpg|jpeg)$/)){

    var bounds = imageBoundsConfig[file.name];

if(!bounds){
alert("ไม่พบพิกัดของภาพนี้");
return;
}

    reader.onload = function(e){

        var imgUrl = URL.createObjectURL(file);

        currentImageOverlay = L.imageOverlay(imgUrl, bounds,{
    opacity:0.7,
    interactive:false
}).addTo(map);

        map.fitBounds(bounds);

        importedLayers[file.name] = currentImageOverlay;
layerControl.addOverlay(currentImageOverlay, file.name);
    };

    reader.readAsDataURL(file);
}

// ===== KML =====
else if(file.name.toLowerCase().endsWith(".kml")){


    reader.onload = function(event){

        var parser = new DOMParser();
        var kml = parser.parseFromString(event.target.result, "text/xml");
        var geojson = toGeoJSON.kml(kml);

        var layer = L.geoJSON(geojson,{
    style: function(feature){

                        var nameValue =
                            feature.properties?.name ||
                            feature.properties?.NAME ||
                            feature.properties?.Zone ||
                            feature.properties?.ZONE ||
                            feature.properties?.Type ||
                            feature.properties?.TYPE ||
                            "";

                        var color = getColor(nameValue);
                        var isConserve = /^อก\.-/.test(normalizeName(nameValue));

                        return {
                            color:"#000000",
                            weight:1,
                            fillColor: isConserve ? "#38A800" : color,
                            fillOpacity: isConserve ? 1 : 0.5
                        };
                    },
                    onEachFeature: onEachFeature
                }).addTo(map);

        if(layer.getBounds().isValid()){
            map.fitBounds(layer.getBounds());
        }
layerControl.addOverlay(layer, file.name);
importedLayers[file.name] = layer;
    };

    reader.readAsText(file);
}

// ===== KMZ =====
else if(file.name.toLowerCase().endsWith(".kmz")){

    reader.onload = function(event){

        JSZip.loadAsync(event.target.result).then(function(zip){

            zip.forEach(function(path, entry){

                if(path.endsWith(".kml")){

                    entry.async("string").then(function(kmlText){

                        var parser = new DOMParser();
                        var kml = parser.parseFromString(kmlText, "text/xml");
                        var geojson = toGeoJSON.kml(kml);

                        var layer = L.geoJSON(geojson,{
    style: function(feature){

                        var nameValue =
                            feature.properties?.name ||
                            feature.properties?.NAME ||
                            feature.properties?.Zone ||
                            feature.properties?.ZONE ||
                            feature.properties?.Type ||
                            feature.properties?.TYPE ||
                            "";

                        var color = getColor(nameValue);
                        var isConserve = /^อก\.-/.test(normalizeName(nameValue));

                        return {
                            color:"#000000",
                            weight:1,
                            fillColor: isConserve ? "#38A800" : color,
                            fillOpacity: isConserve ? 0.5 : 0.5
                        };
                    },
                    onEachFeature: onEachFeature
                }).addTo(map);

                        if(layer.getBounds().isValid()){
                            map.fitBounds(layer.getBounds());
                        }

                        layerControl.addOverlay(layer, file.name);
importedLayers[file.name] = layer;
                    });

                }

            });

        });

    };

    reader.readAsArrayBuffer(file);
}

});
function onEachFeature(feature, layer){

if(!feature.properties) return;

var nameValue =
    feature.properties?.name ||
    feature.properties?.NAME ||
    "";

if(!nameValue) return;

var html = "<div style='font-size:14px; font-weight:bold;'>" 
           + nameValue + 
           "</div>";

var tooltip = L.tooltip({
    sticky: true,
    direction: "top",
    opacity: 0.9
}).setContent(html);

var timer;

layer.on("mouseover", function(e){
    timer = setTimeout(function(){
        tooltip.setLatLng(e.latlng);
        map.openTooltip(tooltip);
    }, 400);   // หน่วง 0.4 วินาที
});

layer.on("mousemove", function(e){
    tooltip.setLatLng(e.latlng);
});

layer.on("mouseout", function(){
    clearTimeout(timer);
    map.closeTooltip(tooltip);
});
}


// ===== ปรับ Opacity Layer =====
document.getElementById("opacitySlider")
.addEventListener("input", function(){

    var percent = parseInt(this.value);
    var value = percent / 100;

    document.getElementById("opacityValue").innerText = percent + "%";

    for(var layerName in importedLayers){

    var layerGroup = importedLayers[layerName];

    if(layerGroup.eachLayer){

        layerGroup.eachLayer(function(subLayer){

            if(subLayer.setStyle){
                subLayer.setStyle({
                    fillOpacity:value,
                    opacity:value
                });
            }

            if(subLayer.setOpacity){
                subLayer.setOpacity(value);
            }

        });

    } else if(layerGroup.setOpacity){

        layerGroup.setOpacity(value);

    }

}

});
// ===== Tooltip Delay 0.4s สำหรับ legend =====
var tooltipDiv = document.createElement("div");
tooltipDiv.className = "custom-tooltip";
document.body.appendChild(tooltipDiv);

var timer;

document.addEventListener("mouseover", function(e){

    if(e.target.classList.contains("legend-box")){

        var text = e.target.getAttribute("data-zone");

        timer = setTimeout(function(){
            tooltipDiv.innerText = text;
            tooltipDiv.style.left = (e.pageX + 10) + "px";
            tooltipDiv.style.top = (e.pageY + 10) + "px";
            tooltipDiv.style.opacity = 1;
        }, 400); // ⬅️ 0.4 วินาที
    }
});

document.addEventListener("mousemove", function(e){

    if(e.target.classList.contains("legend-box")){
        tooltipDiv.style.left = (e.pageX + 10) + "px";
        tooltipDiv.style.top = (e.pageY + 10) + "px";
    }
});

document.addEventListener("mouseout", function(e){

    if(e.target.classList.contains("legend-box")){
        clearTimeout(timer);
        tooltipDiv.style.opacity = 0;
    }
});

// ===== Filter Polygon ตาม Legend =====
document.addEventListener("click", function(e){

    if(e.target.classList.contains("legend-text")){

        var selectedAbbr = e.target.getAttribute("data-abbr");

        if(activeFilterColor === selectedAbbr){
            activeFilterColor = null;
            resetAllLayers();
            return;
        }

        activeFilterColor = selectedAbbr;

        for(var layerName in importedLayers){

            var layerGroup = importedLayers[layerName];

            if(layerGroup.eachLayer){

layerGroup.eachLayer(function(layer){

                if(layer.feature && layer.feature.properties){

                    var nameValue =
                        layer.feature.properties?.name ||
                        layer.feature.properties?.NAME ||
                        "";

                    nameValue = normalizeName(nameValue);

                    var show = false;

                    if(selectedAbbr === "ย.1 - ย.2"){
                        show = /^ย\.1|^ย\.2/.test(nameValue);
                    }
                    else if(selectedAbbr === "ย.3"){
                        show = /^ย\.3/.test(nameValue);
                    }
                    else if(selectedAbbr === "พ."){
                        show = /^พ\./.test(nameValue);
                    }
                    else if(selectedAbbr === "ก.1 - ก.3"){
                        show = /^ก\./.test(nameValue);
                    }
                    else if(selectedAbbr === "อก."){
                        show = /^อก\./.test(nameValue);
                    }
                    else if(selectedAbbr === "ล."){
                        show = /^ล\./.test(nameValue);
                    }
                    else if(selectedAbbr === "ศษ."){
                        show = /^ศษ\./.test(nameValue);
                    }
                    else if(selectedAbbr === "ลส."){
                        show = /^ลส\./.test(nameValue);
                    }
                    else if(selectedAbbr === "อศ."){
                        show = /^อศ\./.test(nameValue);
                    }
                    else if(selectedAbbr === "ศน."){
                        show = /^ศน\./.test(nameValue);
                    }
                    else if(selectedAbbr === "ส."){
                        show = /^ส\./.test(nameValue);
                    }

                    if(show){
                        layer.setStyle({
                            fillOpacity: 0.5,
                            opacity: 1
                        });
                    } else {
                        layer.setStyle({
                            fillOpacity: 0,
                            opacity: 0
                        });
                    }

                }

            });

        }

    }
}
});

function resetAllLayers(){

    for(var layerName in importedLayers){

        var layerGroup = importedLayers[layerName];

        if(layerGroup.eachLayer){

            layerGroup.eachLayer(function(layer){

                if(layer.setStyle){

                    layer.setStyle({
                        fillOpacity:0.5,
                        opacity:1
                    });

                }

            });

        }

    }

}


function refreshAllLayers(){

    activeFilterColor = null;

    for(var layerName in importedLayers){

        var layerGroup = importedLayers[layerName];

        layerGroup.eachLayer(function(layer){

            if(layer.feature && layer.feature.properties){

                var nameValue =
                    layer.feature.properties?.name ||
                    layer.feature.properties?.NAME ||
                    layer.feature.properties?.Zone ||
                    layer.feature.properties?.ZONE ||
                    layer.feature.properties?.Type ||
                    layer.feature.properties?.TYPE ||
                    "";

                var realColor = getColor(nameValue);

                layer.setStyle({
                    fillColor: realColor,
                    fillOpacity: 0.5,
                    opacity: 0.5
                });

            }

        });

    }

}

fetch("./PLLU_SATINGPHRA.kmz")
.then(response => {
    if(!response.ok){
        throw new Error("โหลดไฟล์ไม่สำเร็จ: " + response.status);
    }
    return response.arrayBuffer();
})
.then(data => JSZip.loadAsync(data))
.then(zip => {

    let found = false;

    zip.forEach((path, entry) => {

        if(path.toLowerCase().endsWith(".kml")){

            found = true;

            entry.async("string").then(kmlText => {

                var parser = new DOMParser();
                var kml = parser.parseFromString(kmlText, "text/xml");
                var geojson = toGeoJSON.kml(kml);

                var layer = L.geoJSON(geojson,{
                    style: function(feature){

                        var nameValue =
                            feature.properties?.name ||
                            feature.properties?.NAME ||
                            feature.properties?.Zone ||
                            feature.properties?.ZONE ||
                            feature.properties?.Type ||
                            feature.properties?.TYPE ||
                            "";

                        var color = getColor(nameValue);
                        var isConserve = /^อก\.-/.test(normalizeName(nameValue));

                        return {
                            color:"#000000",
                            weight:1,
                            fillColor: isConserve ? "#38A800" : color,
                            fillOpacity: isConserve ? 0.5 : 0.5
                        };
                    },
                    onEachFeature: onEachFeature
                });
                importedLayers["PLLU_SATINGPHRA"] = layer;
layerControl.addOverlay(layer, "PLLU_SATINGPHRA");

                if(layer.getBounds().isValid()){
                    map.fitBounds(layer.getBounds());
                }

            });

        }

    });

    if(!found){
        alert("ไม่พบไฟล์ KML หรือ KMZ");
    }

})
.catch(err => {
    console.error(err);
});

function updateImageBounds(){

if(!currentImageOverlay){
alert("ยังไม่มีภาพ");
return;
}

var sw = document.getElementById("pngSW").value.replace(/\s+/g,'').split(",");
var ne = document.getElementById("pngNE").value.replace(/\s+/g,'').split(",");

if(sw.length!==2 || ne.length!==2){
alert("พิกัดไม่ถูกต้อง");
return;
}

var bounds = [
[parseFloat(sw[0]), parseFloat(sw[1])],
[parseFloat(ne[0]), parseFloat(ne[1])]
];

currentImageOverlay.setBounds(bounds);

map.fitBounds(bounds);

}

function toggleLegend(){

    var legendBox = document.querySelector(".leaflet-control-custom");
    var btn = document.querySelector(".legend-toggle");

    if(!legendBox) return;

    var current = window.getComputedStyle(legendBox).display;

    if(current === "none"){
        legendBox.style.display = "block";
        btn.innerHTML = "ซ่อนคำอธิบายสัญลักษณ์";
    }else{
        legendBox.style.display = "none";

    }

}
